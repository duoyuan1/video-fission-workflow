name: Python Smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: python -m pip install -e .

      - name: Compile workflow package
        run: python -m py_compile workflow/*.py

      - name: Show CLI help
        run: video-fission-workflow --help
